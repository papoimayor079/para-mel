<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { background: linear-gradient(135deg, #0d0d0d 0%, #1a080c 100%); color: #ffffff; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        .waves { position: absolute; bottom: 0; left: 0; width: 100%; height: auto; z-index: 1; pointer-events: none; }
        .card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(114, 47, 55, 0.4); border-radius: 20px; padding: 40px 20px; text-align: center; z-index: 10; max-width: 90%; width: 350px; transition: opacity 0.5s ease; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; margin-bottom: 2rem; line-height: 1.2; text-shadow: 0 0 15px rgba(114, 47, 55, 0.7); }
        .buttons { display: flex; gap: 20px; justify-content: center; align-items: center; position: relative; min-height: 50px; }
        .buttons-column { flex-direction: column; gap: 15px; }
        button { font-family: 'Montserrat', sans-serif; font-size: 1rem; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-weight: 500; text-transform: uppercase; transition: all 0.2s ease; width: 100%; }
        .btn-vino { background: linear-gradient(135deg, #722F37, #4a1c24); color: white; box-shadow: 0 4px 15px rgba(114, 47, 55, 0.6); z-index: 11; }
        #btn-no { background: transparent; color: #aaa; border: 1px solid #555; position: relative; width: auto; }
        #contenedor-final { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; width: 90%; }
        .te-quiero { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 700; color: #ffffff; text-shadow: 0 0 20px #722F37, 0 0 40px #722F37; margin-bottom: 20px; }
        .poema { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 300; color: #e0e0e0; line-height: 1.6; }
        .firework-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 15; display: none; }
        .firework { position: absolute; width: 4px; height: 4px; border-radius: 50%; animation: explode 1.5s ease-out infinite; }
        .firework::before { content: ''; position: absolute; width: 4px; height: 4px; border-radius: 50%; box-shadow: 0 0 #fff, 20px -30px #fff, -20px -50px #fff, 50px -10px #fff, -40px 20px #fff, 30px 40px #fff, -60px -20px #fff, 10px 60px #fff, 0 0 #722F37, 30px -40px #722F37, -30px -60px #722F37, 60px -20px #722F37, -50px 30px #722F37, 40px 50px #722F37, -70px -30px #722F37, 20px 70px #722F37; animation: particle-spread 1.5s ease-out infinite; }
        @keyframes explode { 0% { transform: translate(-50%, 0) scale(0); opacity: 1; } 50% { transform: translate(-50%, -100px) scale(1); opacity: 1; } 100% { transform: translate(-50%, -100px) scale(1.5); opacity: 0; } }
        @keyframes particle-spread { 0% { box-shadow: 0 0 #fff; } 100% { box-shadow: 0 0 rgba(255,255,255,0), 40px -60px rgba(255,255,255,0), -40px -100px rgba(255,255,255,0), 100px -20px rgba(255,255,255,0), -80px 40px rgba(255,255,255,0), 60px 80px rgba(255,255,255,0), -120px -40px rgba(255,255,255,0), 20px 120px rgba(255,255,255,0), 0 0 rgba(114,47,55,0), 60px -80px rgba(114,47,55,0), -60px -120px rgba(114,47,55,0), 120px -40px rgba(114,47,55,0), -100px 60px rgba(114,47,55,0), 80px 100px rgba(114,47,55,0), -140px -60px rgba(114,47,55,0), 40px 140px rgba(114,47,55,0); } }
        .f1 { left: 20%; top: 30%; animation-delay: 0s; } .f2 { left: 80%; top: 20%; animation-delay: 0.3s; } .f3 { left: 50%; top: 40%; animation-delay: 0.6s; } .f4 { left: 30%; top: 60%; animation-delay: 0.9s; } .f5 { left: 70%; top: 70%; animation-delay: 1.2s; }
    </style>
</head>
<body>
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="#722F37" fill-opacity="0.3" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,213.3C672,224,768,224,864,208C960,192,1056,160,1152,149.3C1248,139,1344,149,1392,154.7L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>

    <div class="card" id="tarjeta-pregunta">
        <h1>¿Quieres ser mi novia?</h1>
        <div class="buttons">
            <button id="btn-si" class="btn-vino" style="width: auto;">Sí</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <div class="card" id="tarjeta-canciones" style="display: none; opacity: 0;">
        <h1 style="font-size: 1.8rem; margin-bottom: 1.5rem;">Elige nuestra canción:</h1>
        <div class="buttons buttons-column">
            <button id="btn-cancion1" class="btn-vino">Sentado Aquí</button>
            <button id="btn-cancion2" class="btn-vino">Más Humano</button>
        </div>
    </div>

    <div class="firework-container" id="fuegos">
        <div class="firework f1"></div><div class="firework f2"></div><div class="firework f3"></div><div class="firework f4"></div><div class="firework f5"></div>
    </div>

    <div id="contenedor-final">
        <div class="te-quiero">Te quiero, Mel</div>
        <div class="poema">
            Contigo todo siempre es de otro nivel,<br>
            tienes una chispa más dulce que la miel.<br>
            No quería guardarlo en un simple papel:<br>
            Me encantas demasiado, mi linda Mel.
        </div>
    </div>

    <audio id="audio-sentado" src="sentado.mp3"></audio>
    <audio id="audio-humano" src="humano.mp3"></audio>

    <script>
        const btnNo = document.getElementById('btn-no'), btnSi = document.getElementById('btn-si'), tarjetaPregunta = document.getElementById('tarjeta-pregunta'), tarjetaCanciones = document.getElementById('tarjeta-canciones'), fuegos = document.getElementById('fuegos'), contenedorFinal = document.getElementById('contenedor-final');
        let escalaSi = 1;

        const esquivar = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            escalaSi += 0.35;
            btnSi.style.transform = `scale(${escalaSi})`;
            btnNo.style.position = 'fixed';
            btnNo.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btnNo.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        };

        btnNo.addEventListener('mouseover', esquivar);
        btnNo.addEventListener('touchstart', esquivar, {passive: false});

        btnSi.addEventListener('click', () => {
            tarjetaPregunta.style.opacity = '0';
            setTimeout(() => { tarjetaPregunta.style.display = 'none'; tarjetaCanciones.style.display = 'block'; setTimeout(() => tarjetaCanciones.style.opacity = '1', 50); }, 500);
        });

        function activarCelebracion(idAudio) {
            document.getElementById(idAudio).play();
            tarjetaCanciones.style.opacity = '0';
            setTimeout(() => {
                tarjetaCanciones.style.display = 'none';
                contenedorFinal.style.display = 'block';
                fuegos.style.display = 'block';
            }, 300);
        }

        document.getElementById('btn-cancion1').addEventListener('click', () => activarCelebracion('audio-sentado'));
        document.getElementById('btn-cancion2').addEventListener('click', () => activarCelebracion('audio-humano'));
    </script>
</body>
</html>
