<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti...</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: rgba(20,20,20,0.8); border: 1px solid #722F37; border-radius: 20px; padding: 40px; text-align: center; z-index: 10; width: 300px; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #722F37; color: white; cursor: pointer; margin: 10px; font-weight: bold; }
        #contenedor-final { display: none; text-align: center; z-index: 20; }
        /* Animación de Fuego y Flores */
        .efecto { position: absolute; width: 20px; height: 20px; border-radius: 50%; opacity: 0; animation: animarTodo 2s ease-out; }
        @keyframes animarTodo { 
            0% { transform: scale(0); opacity: 1; } 
            100% { transform: scale(8); opacity: 0; } 
        }
    </style>
</head>
<body>
    <div class="card" id="tarjeta-pregunta">
        <h1>¿Quieres ser mi novia?</h1>
        <button id="btn-si">Sí</button>
        <button id="btn-no">No</button>
    </div>

    <div class="card" id="tarjeta-canciones" style="display: none;">
        <h1>Elige nuestra canción:</h1>
        <button onclick="activar('audio-sentado')">Sentado Aquí</button>
        <button onclick="activar('audio-humano')">Más Humano</button>
    </div>

    <div id="contenedor-final">
        <h1>Te quiero, Mel</h1>
        <p>Contigo todo siempre es de otro nivel,<br>tienes una chispa más dulce que la miel.<br>No quería guardarlo en un simple papel:<br>Me encantas demasiado, mi linda Mel.</p>
    </div>

    <div id="efectos-container"></div>

    <audio id="audio-sentado" src="sentado.mp3"></audio>
    <audio id="audio-humano" src="humano.mp3"></audio>

    <script>
        const btnSi = document.getElementById('btn-si'), btnNo = document.getElementById('btn-no'), tarjetaPregunta = document.getElementById('tarjeta-pregunta'), tarjetaCanciones = document.getElementById('tarjeta-canciones'), contenedorFinal = document.getElementById('contenedor-final');

        btnSi.onclick = () => { tarjetaPregunta.style.display = 'none'; tarjetaCanciones.style.display = 'block'; };
        btnNo.onmouseover = () => { btnNo.style.position = 'absolute'; btnNo.style.left = Math.random()*80 + 'vw'; btnNo.style.top = Math.random()*80 + 'vh'; };

        function activar(id) {
            document.getElementById(id).play();
            tarjetaCanciones.style.display = 'none';
            contenedorFinal.style.display = 'block';
            
            // Generar fuegos y flores (rojo y verde)
            const colores = ['#FF0000', '#32CD32', '#FFFFFF'];
            for(let i=0; i<30; i++) {
                let e = document.createElement('div'); 
                e.className = 'efecto';
                e.style.left = Math.random()*100 + '%'; 
                e.style.top = Math.random()*100 + '%';
                e.style.backgroundColor = colores[Math.floor(Math.random()*colores.length)];
                e.style.animationDelay = (i*0.1) + 's';
                document.getElementById('efectos-container').appendChild(e);
            }
        }
    </script>
</body>
</html>
