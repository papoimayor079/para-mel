<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mel</title>
    <style>
        body { background: #0d0d0d; color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: rgba(20, 20, 20, 0.7); border: 1px solid #722F37; border-radius: 20px; padding: 40px; text-align: center; z-index: 100; width: 320px; }
        button { padding: 15px 30px; border-radius: 50px; border: none; background: #722F37; color: white; cursor: pointer; margin: 10px; font-weight: bold; }
        #contenedor-final { display: none; text-align: center; z-index: 100; }
        /* Efecto de partículas */
        .particula { position: absolute; border-radius: 50%; pointer-events: none; z-index: 50; animation: animar 2s linear forwards; }
        @keyframes animar { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(5); opacity: 0; } }
    </style>
</head>
<body>
    <div class="card" id="tarjeta-pregunta">
        <h1>¿Quieres ser mi novia?</h1>
        <button id="btn-si">Sí</button>
        <button id="btn-no">No</button>
    </div>

    <div class="card" id="tarjeta-canciones" style="display: none;">
        <h1>Elige nuestra canción:</h1>
        <button onclick="iniciar('audio-sentado')">Sentado Aquí</button>
        <button onclick="iniciar('audio-humano')">Más Humano</button>
    </div>

    <div id="contenedor-final">
        <h1 style="color: white; font-size: 3rem;">Te quiero, Mel</h1>
        <p style="font-size: 1.2rem;">Contigo todo siempre es de otro nivel,<br>tienes una chispa más dulce que la miel.<br>No quería guardarlo en un simple papel:<br>Me encantas demasiado, mi linda Mel.</p>
    </div>

    <audio id="audio-sentado" src="sentado.mp3"></audio>
    <audio id="audio-humano" src="humano.mp3"></audio>

    <script>
        document.getElementById('btn-si').onclick = () => { document.getElementById('tarjeta-pregunta').style.display = 'none'; document.getElementById('tarjeta-canciones').style.display = 'block'; };
        document.getElementById('btn-no').onmouseover = (e) => { e.target.style.position = 'fixed'; e.target.style.left = Math.random()*80 + 'vw'; e.target.style.top = Math.random()*80 + 'vh'; };

        function iniciar(id) {
            document.getElementById(id).play();
            document.getElementById('tarjeta-canciones').style.display = 'none';
            document.getElementById('contenedor-final').style.display = 'block';
            setInterval(crearEfecto, 150);
        }

        function crearEfecto() {
            let p = document.createElement('div');
            p.className = 'particula';
            const color = ['#FF0000', '#32CD32', '#FFFFFF'][Math.floor(Math.random()*3)];
            p.style.background = color;
            p.style.width = p.style.height = (Math.random()*15+5) + 'px';
            p.style.left = Math.random()*100 + 'vw';
            p.style.top = Math.random()*100 + 'vh';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }
    </script>
</body>
</html>
